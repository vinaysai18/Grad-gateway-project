<!DOCTYPE html>
<html>

<head>
    <title>GradGateway - Register</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="navbar-left">
            <img src="logo.png" alt="Logo">
            <div class="navbar-title">GradGateway</div>
        </div>
    </div>

    <!-- REGISTER CARD -->
    <div class="container">
        <div class="card">

            <h2 id="formTitle">Register</h2>

            <div class="role-buttons">
                <button type="button" id="studentBtn" class="role-btn active">Student</button>
                <button type="button" id="employeeBtn" class="role-btn">Employer</button>
            </div>

            <div class="requirements" id="requirementsBox" style="display: flex;">
                • Password must be at least 6 characters
            </div>

            <form id="authForm">
                <input type="text" id="fullname" placeholder="Enter Full Name" required>
                <input type="text" id="studentId" placeholder="Enter Student ID" style="display: block;">
                <input type="email" id="email" placeholder="Enter Student Email" required>
                <input type="password" id="password" placeholder="Enter Password" required>

                <button type="submit" class="submit-btn" id="submitBtn">Register</button>
            </form>

            <div class="switch-link">
                <a href="login.html" style="text-decoration: none; color: inherit;">Already have an account? Login</a>
            </div>

        </div>
    </div>

    <footer class="footer">
        © 2026 <strong>GradGateway</strong> | Official Placement Portal • Built for Excellence
    </footer>

    <script src="register.js"></script>
</body>

</html>
